<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('kpwd-theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Dashboard &mdash; King Praise Web Design</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],sans:['Inter','sans-serif']}}}}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/img/favicon.png">
<link rel="icon" href="../assets/img/favicon.ico" sizes="any">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body>
<div id="page-loader" class="page-loader">
  <div class="loader-stage">
    <img src="../assets/img/logo-icon.png" alt="Loading" class="loader-logo">
    <div class="loader-shadow"></div>
    <div class="loader-label">King Praise Web Design</div>
  </div>
</div>

<header class="border-b border-white/10">
  <div class="max-w-6xl mx-auto px-5 lg:px-8 py-4 flex items-center justify-between">
    <div class="flex items-center gap-2">
      <img src="../assets/img/logo-icon.png" alt="King Praise Web Design" class="logo-icon" style="width:2rem;height:2rem">
      <span class="font-display font-semibold text-white">Client Portal</span>
    </div>
    <div class="flex items-center gap-3">
      <span class="text-slate-400 text-sm hidden sm:inline">Hi, <span id="client-name" class="text-white font-medium"></span></span>
      <button class="theme-toggle" data-theme-toggle aria-label="Toggle dark / light mode">
        <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
      </button>
      <a href="../index.html" class="btn-ghost px-4 py-2 rounded-lg text-sm">Main Site</a>
      <button id="logout-btn" class="btn-ghost px-4 py-2 rounded-lg text-sm">Logout</button>
    </div>
  </div>
</header>
<main class="max-w-6xl mx-auto px-5 lg:px-8 py-12">
  <h1 class="font-display text-3xl font-bold text-white">Your Projects</h1>
  <p class="text-slate-400 mt-2">Track progress, milestones, and updates from our team.</p>
  <div id="projects-container" class="space-y-6 mt-8"></div>
</main>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/client-dashboard.js"></script>
</body>
</html>
