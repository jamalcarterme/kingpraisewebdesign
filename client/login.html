<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('kpwd-theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Client Login &mdash; King Praise Web Design</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],sans:['Inter','sans-serif']}}}}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-grid min-h-screen">
<div id="page-loader" class="page-loader">
  <div class="loader-stage">
    <img src="../assets/img/logo-icon.png" alt="Loading" class="loader-logo">
    <div class="loader-shadow"></div>
    <div class="loader-label">King Praise Web Design</div>
  </div>
</div>

<div id="site-header"></div>
<main class="min-h-screen flex items-center justify-center px-5 pt-24 pb-10">
  <div class="glass rounded-2xl p-8 w-full max-w-md reveal in">
    <div class="text-center mb-6">
      <img src="../assets/img/logo-icon.png" alt="King Praise Web Design" class="logo-icon mx-auto">
      <h1 class="font-display text-2xl font-bold text-white mt-3">Client Portal</h1>
      <p class="text-slate-400 text-sm mt-1">Sign in to track your project progress</p>
    </div>
    <form id="client-login-form" class="space-y-4">
      <div><label class="form-label">Email</label><input required type="email" name="email" class="form-input"></div>
      <div><label class="form-label">Password</label><input required type="password" name="password" class="form-input"></div>
      <button type="submit" class="btn-primary w-full py-3 rounded-xl">Sign In</button>
    </form>
    <p class="text-center text-sm text-slate-400 mt-6">No account yet? <a href="register.html" class="text-[var(--brand-2)] hover:underline">Create one</a></p>
  </div>
</main>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/auth-client.js"></script>
</body>
</html>
