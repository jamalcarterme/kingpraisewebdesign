<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Client Account &mdash; King Praise Web Design</title>
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],sans:['Inter','sans-serif']}}}}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="../assets/img/favicon.svg">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-grid min-h-screen">
<div id="site-header"></div>
<main class="min-h-screen flex items-center justify-center px-5 pt-24 pb-10">
  <div class="glass rounded-2xl p-8 w-full max-w-md reveal in">
    <div class="text-center mb-6">
      <span class="bracket-mark text-3xl"><span class="bkt">&lt;</span><span class="slash">K</span><span class="bkt">/&gt;</span></span>
      <h1 class="font-display text-2xl font-bold text-white mt-3">Create Your Account</h1>
      <p class="text-slate-400 text-sm mt-1">Track your project milestones in one place</p>
    </div>
    <form id="client-register-form" class="space-y-4">
      <div><label class="form-label">Full Name</label><input required name="name" class="form-input"></div>
      <div><label class="form-label">Email</label><input required type="email" name="email" class="form-input"></div>
      <div><label class="form-label">Password</label><input required type="password" minlength="6" name="password" class="form-input"></div>
      <div class="grid grid-cols-2 gap-3">
        <div><label class="form-label">Phone</label><input name="phone" class="form-input"></div>
        <div><label class="form-label">Country</label><input name="country" class="form-input"></div>
      </div>
      <div><label class="form-label">Company (optional)</label><input name="company" class="form-input"></div>
      <button type="submit" class="btn-primary w-full py-3 rounded-xl">Create Account</button>
    </form>
    <p class="text-center text-sm text-slate-400 mt-6">Already have an account? <a href="login.html" class="text-[var(--brand-2)] hover:underline">Sign in</a></p>
  </div>
</main>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/auth-client.js"></script>
</body>
</html>
