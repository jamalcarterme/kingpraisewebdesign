<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('kpwd-theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login &mdash; King Praise Web Design</title>
<meta name="robots" content="noindex, nofollow">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],sans:['Inter','sans-serif']}}}}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="../assets/img/favicon.png">
<link rel="icon" href="../assets/img/favicon.ico" sizes="any">
<link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-grid min-h-screen">
<div id="page-loader" class="page-loader">
  <div class="loader-stage">
    <img src="../assets/img/logo-icon.png" alt="Loading" class="loader-logo">
    <div class="loader-shadow"></div>
    <div class="loader-label">King Praise Web Design</div>
  </div>
</div>

<button class="theme-toggle fixed top-5 right-5 z-50" data-theme-toggle aria-label="Toggle dark / light mode">
  <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
  <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="4"/><path stroke-linecap="round" d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/></svg>
</button>
<main class="min-h-screen flex items-center justify-center px-5">
  <div class="glass rounded-2xl p-8 w-full max-w-md">
    <div class="text-center mb-6">
      <img src="../assets/img/logo-icon.png" alt="King Praise Web Design" class="logo-icon mx-auto">
      <h1 class="font-display text-2xl font-bold text-white mt-3">Admin Dashboard</h1>
      <p class="text-slate-400 text-sm mt-1">Authorized personnel only</p>
    </div>
    <form id="admin-login-form" class="space-y-4">
      <div><label class="form-label">Email</label><input required type="email" name="email" class="form-input"></div>
      <div><label class="form-label">Password</label><input required type="password" name="password" class="form-input"></div>
      <button type="submit" class="btn-primary w-full py-3 rounded-xl">Sign In</button>
    </form>
    <p class="text-center text-sm mt-6"><a href="../index.html" class="text-slate-500 hover:text-white transition">&larr; Back to site</a></p>
  </div>
</main>
<script src="../assets/js/config.js"></script>
<script src="../assets/js/api.js"></script>
<script src="../assets/js/ui.js"></script>
<script src="../assets/js/admin-auth.js"></script>
</body>
</html>
