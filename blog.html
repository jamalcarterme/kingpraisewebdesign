<!DOCTYPE html>
<html lang="en">
<head>
<script>(function(){try{var t=localStorage.getItem('kpwd-theme')||((window.matchMedia&&matchMedia('(prefers-color-scheme: light)').matches)?'light':'dark');document.documentElement.setAttribute('data-theme',t);}catch(e){}})();</script>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Blog &mdash; King Praise Web Design</title>
<meta name="description" content="Insights on web design, development, and digital growth from King Praise Web Design.">
<script src="https://cdn.tailwindcss.com"></script>
<script>tailwind.config={theme:{extend:{fontFamily:{display:['Space Grotesk','sans-serif'],sans:['Inter','sans-serif']}}}}</script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/png" href="assets/img/favicon.png">
<link rel="icon" href="assets/img/favicon.ico" sizes="any">
<link rel="stylesheet" href="assets/css/main.css">
</head>
<body>
<div id="page-loader" class="page-loader">
  <div class="loader-stage">
    <img src="assets/img/logo-icon.png" alt="Loading" class="loader-logo">
    <div class="loader-shadow"></div>
    <div class="loader-label">King Praise Web Design</div>
  </div>
</div>

<div id="site-header"></div>
<main class="pt-40 pb-24 max-w-7xl mx-auto px-5 lg:px-8">
  <div class="text-center max-w-2xl mx-auto reveal in">
    <span class="text-[var(--brand-2)] text-xs font-semibold uppercase tracking-widest">Blog</span>
    <h1 class="font-display text-4xl sm:text-5xl font-bold text-white mt-3">Ideas on design, code &amp; growth</h1>
  </div>
  <div class="flex flex-col sm:flex-row gap-4 items-center justify-between mt-10">
    <div id="blog-filters" class="flex flex-wrap gap-3"></div>
    <input id="blog-search" type="text" placeholder="Search articles..." class="form-input sm:w-72">
  </div>
  <div id="blog-grid" class="grid sm:grid-cols-2 lg:grid-cols-3 gap-6 mt-10"></div>
</main>
<div id="site-footer"></div>
<script src="assets/js/config.js"></script>
<script src="assets/js/api.js"></script>
<script src="assets/js/ui.js"></script>
<script src="assets/js/blog.js"></script>
</body>
</html>
